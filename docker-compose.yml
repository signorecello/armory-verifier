services:
  # Build the WaTZ wasm module and export it to ./out/armory_verifier.wasm.
  # Stops at the native `export` stage — no QEMU needed for a file copy.
  verifier-wasm:
    build:
      context: .
      dockerfile: Dockerfile.wasm
      target: export
    volumes:
      - ./out:/out
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /out
        cp /opt/armory_verifier.wasm /out/armory_verifier.wasm
        ls -lh /out/armory_verifier.wasm

  # Run the verifier inside an environment that resembles the USB Armory
  # MK II running WaTZ as closely as Docker + QEMU allow:
  #
  #   - Platform     : linux/arm/v7  (user-mode QEMU ARMv7 emulation)
  #   - CPU tuning   : Cortex-A7, -neon (baked into the harness at build)
  #   - WASM runtime : wasmi pure-Rust interpreter (~WAMR classic-interp)
  #   - Entry point  : verifier_alloc / verifier_dealloc / verifier_verify
  #                    exactly as a WaTZ OP-TEE TA would call them
  #
  # QEMU user-mode emulation is not cycle-accurate — the relative slowdown
  # between native ARM and this interpreter path is the meaningful number.
  verifier-wasm-smoke:
    build:
      context: .
      dockerfile: Dockerfile.wasm
      target: runtime
    platform: linux/arm/v7
    volumes:
      - ./artifacts:/data/artifacts:ro
