name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & verify circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Install bb (barretenberg)
        run: |
          # Pin to the version used to generate the test artifacts
          BB_VERSION=v4.0.0-nightly.20260120
          curl -fsSL "https://github.com/AztecProtocol/aztec-packages/releases/download/${BB_VERSION}/barretenberg-amd64-linux.tar.gz" | tar xz -C /usr/local/bin
          bb --version

      - name: Verify all circuits (armory-verifier)
        run: |
          for circuit in example arithmetic hash large range; do
            echo "--- $circuit ---"
            ./target/release/armory-verifier \
              -p artifacts/$circuit/proof \
              -k artifacts/$circuit/vk \
              -i artifacts/$circuit/public_inputs
          done

      - name: Verify all circuits (bb verify)
        run: |
          for circuit in example arithmetic hash large range; do
            echo "--- $circuit ---"
            bb verify \
              -p artifacts/$circuit/proof \
              -k artifacts/$circuit/vk \
              -i artifacts/$circuit/public_inputs \
              -t evm
          done

      - name: Reject corrupted proof (armory-verifier)
        run: |
          cp artifacts/example/proof /tmp/bad_proof
          python3 -c "d=bytearray(open('/tmp/bad_proof','rb').read()); d[100]^=1; open('/tmp/bad_proof','wb').write(d)"
          ! ./target/release/armory-verifier -p /tmp/bad_proof -k artifacts/example/vk -i artifacts/example/public_inputs 2>/dev/null

      - name: Reject corrupted proof (bb verify)
        run: |
          ! bb verify -p /tmp/bad_proof -k artifacts/example/vk -i artifacts/example/public_inputs -t evm 2>/dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  build-arm:
    name: Build ARM (Cortex-A7, no NEON)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build ARM image
        run: docker build --platform linux/arm/v7 -f Dockerfile.arm -t armory-verifier:arm .

      - name: Verify all circuits (ARM)
        run: |
          for circuit in example arithmetic hash large range; do
            echo "--- $circuit ---"
            docker run --rm --platform linux/arm/v7 \
              -v ${{ github.workspace }}/artifacts:/data/artifacts:ro \
              armory-verifier:arm \
              -p /data/artifacts/$circuit/proof \
              -k /data/artifacts/$circuit/vk \
              -i /data/artifacts/$circuit/public_inputs
          done
