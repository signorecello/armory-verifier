name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & verify circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Install bb (barretenberg)
        run: |
          # Pin to the version used to generate the test artifacts
          BB_VERSION=v4.0.0-nightly.20260120
          curl -fsSL "https://github.com/AztecProtocol/aztec-packages/releases/download/${BB_VERSION}/barretenberg-amd64-linux.tar.gz" | tar xz -C /usr/local/bin
          bb --version

      - name: Verify all circuits (armory-verifier)
        run: |
          for circuit in example arithmetic hash large range; do
            echo "--- $circuit ---"
            ./target/release/armory-verifier \
              -p artifacts/$circuit/proof \
              -k artifacts/$circuit/vk \
              -i artifacts/$circuit/public_inputs
          done

      - name: Verify all circuits (bb verify)
        run: |
          for circuit in example arithmetic hash large range; do
            echo "--- $circuit ---"
            bb verify \
              -p artifacts/$circuit/proof \
              -k artifacts/$circuit/vk \
              -i artifacts/$circuit/public_inputs \
              -t evm
          done

      - name: Reject corrupted proof (armory-verifier)
        run: |
          cp artifacts/example/proof /tmp/bad_proof
          python3 -c "d=bytearray(open('/tmp/bad_proof','rb').read()); d[100]^=1; open('/tmp/bad_proof','wb').write(d)"
          ! ./target/release/armory-verifier -p /tmp/bad_proof -k artifacts/example/vk -i artifacts/example/public_inputs 2>/dev/null

      - name: Reject corrupted proof (bb verify)
        run: |
          ! bb verify -p /tmp/bad_proof -k artifacts/example/vk -i artifacts/example/public_inputs -t evm 2>/dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: thumbv7em-none-eabi
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy (native, default features)
        run: cargo clippy -- -D warnings
      - name: Clippy (no_std library)
        run: cargo clippy --target thumbv7em-none-eabi --no-default-features --lib -- -D warnings

  gotee-build:
    name: Build GoTEE applet (armv7a-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7a-none-eabi, thumbv7em-none-eabi
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            applets/gotee/target
          key: ${{ runner.os }}-gotee-${{ hashFiles('Cargo.lock', 'applets/gotee/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-gotee-
      - name: Check no_std library (bare-metal ARM)
        run: cargo check --target thumbv7em-none-eabi --no-default-features --lib
      - name: Build GoTEE applet
        working-directory: applets/gotee
        run: cargo build --release
